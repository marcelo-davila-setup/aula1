<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avisos Importantes</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=Pacifico&family=Nunito:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --amarelo: #F7C948;
    --amarelo-escuro: #E5A800;
    --azul: #4B9FE1;
    --azul-escuro: #1B6CB0;
    --azul-claro: #A8D4F5;
    --bg: #0D1B2A;
    --bg2: #112338;
    --branco: #FFFFFF;
    --off: #E8F4FF;
  }

  html, body {
    width: 100%;
    min-height: 100vh;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Nunito', sans-serif;
    overflow-x: hidden;
  }

  /* Fundo com partículas desenhadas */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 600px 400px at 10% 20%, rgba(75,159,225,0.12) 0%, transparent 70%),
      radial-gradient(ellipse 400px 300px at 90% 80%, rgba(247,201,72,0.10) 0%, transparent 70%),
      radial-gradient(ellipse 300px 200px at 50% 50%, rgba(75,159,225,0.06) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .stage {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 1000px;
    padding: 60px 40px;
  }

  /* CARD principal */
  .card {
    background: linear-gradient(145deg, #0f2035 0%, #0a1828 60%, #0d1f30 100%);
    border-radius: 32px;
    padding: 64px 72px 72px;
    border: 1px solid rgba(75,159,225,0.18);
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.04) inset,
      0 40px 80px rgba(0,0,0,0.5),
      0 0 60px rgba(75,159,225,0.08);
    position: relative;
    overflow: hidden;
  }

  /* Brilho de canto */
  .card::before {
    content: '';
    position: absolute;
    top: -1px; left: -1px; right: -1px;
    height: 2px;
    background: linear-gradient(90deg, transparent 0%, var(--amarelo) 30%, var(--azul) 70%, transparent 100%);
    border-radius: 32px 32px 0 0;
    opacity: 0.8;
  }

  /* Círculo decorativo fundo */
  .card::after {
    content: '';
    position: absolute;
    right: -120px;
    bottom: -120px;
    width: 360px;
    height: 360px;
    border-radius: 50%;
    border: 40px solid rgba(75,159,225,0.05);
    pointer-events: none;
  }

  /* ——— HEADER ——— */
  .header {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 56px;
    opacity: 0;
    transform: translateY(-20px);
    animation: fadeDown 0.7s cubic-bezier(.22,.68,0,1.2) 0.1s forwards;
  }

  .header-icon {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    flex-shrink: 0;
  }

  .badge-aviso {
    background: linear-gradient(135deg, var(--amarelo) 0%, var(--amarelo-escuro) 100%);
    color: #1a0f00;
    font-family: 'Caveat', cursive;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    padding: 5px 14px;
    border-radius: 20px;
    display: inline-block;
    margin-bottom: 10px;
    opacity: 0;
    animation: fadeIn 0.5s ease 0.5s forwards;
  }

  .titulo-wrap {
    flex: 1;
  }

  .titulo-principal {
    font-family: 'Caveat', cursive;
    font-size: 76px;
    font-weight: 700;
    line-height: 0.95;
    color: transparent;
    background: linear-gradient(135deg, var(--amarelo) 0%, #FFE07A 50%, var(--amarelo-escuro) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    letter-spacing: 1px;
    position: relative;
  }

  .titulo-icon {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    vertical-align: middle;
    margin-left: 8px;
  }

  /* ——— ITENS ——— */
  .itens {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .item {
    display: flex;
    align-items: stretch;
    gap: 0;
    border-radius: 20px;
    overflow: hidden;
    opacity: 0;
    transform: translateX(-30px);
    transition: transform 0.25s ease, box-shadow 0.25s ease;
  }

  .item:hover {
    transform: translateX(6px) !important;
    box-shadow: 0 8px 32px rgba(75,159,225,0.2);
  }

  .item:nth-child(1) { animation: slideIn 0.6s cubic-bezier(.22,.68,0,1.2) 0.35s forwards; }
  .item:nth-child(2) { animation: slideIn 0.6s cubic-bezier(.22,.68,0,1.2) 0.50s forwards; }
  .item:nth-child(3) { animation: slideIn 0.6s cubic-bezier(.22,.68,0,1.2) 0.65s forwards; }
  .item:nth-child(4) { animation: slideIn 0.6s cubic-bezier(.22,.68,0,1.2) 0.80s forwards; }
  .item:nth-child(5) { animation: slideIn 0.6s cubic-bezier(.22,.68,0,1.2) 0.95s forwards; }

  .item-lateral {
    width: 8px;
    flex-shrink: 0;
    background: linear-gradient(180deg, var(--azul) 0%, var(--azul-escuro) 100%);
  }

  .item-corpo {
    flex: 1;
    background: rgba(75,159,225,0.07);
    border: 1px solid rgba(75,159,225,0.14);
    border-left: none;
    border-radius: 0 20px 20px 0;
    padding: 22px 30px 22px 26px;
    display: flex;
    align-items: center;
    gap: 18px;
  }

  .item-numero {
    font-family: 'Caveat', cursive;
    font-size: 28px;
    font-weight: 700;
    color: var(--azul-claro);
    opacity: 0.5;
    min-width: 32px;
    flex-shrink: 0;
  }

  .item-texto {
    font-family: 'Caveat', cursive;
    font-size: 46px;
    font-weight: 700;
    color: #C8E8FF;
    line-height: 1.1;
    flex: 1;
  }

  .item-icone {
    flex-shrink: 0;
    width: 48px;
    height: 48px;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
  }

  .icone-amarelo { background: rgba(247,201,72,0.15); }
  .icone-azul    { background: rgba(75,159,225,0.15); }
  .icone-verde   { background: rgba(72,210,150,0.15); }
  .icone-rosa    { background: rgba(240,100,160,0.15); }

  /* Link WhatsApp */
  .wpp-link {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    margin-top: 10px;
    background: linear-gradient(135deg, #25D366 0%, #128C7E 100%);
    color: #fff;
    font-family: 'Caveat', cursive;
    font-size: 32px;
    font-weight: 700;
    padding: 10px 24px 10px 16px;
    border-radius: 50px;
    text-decoration: none;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 4px 20px rgba(37,211,102,0.3);
  }
  .wpp-link:hover {
    transform: scale(1.04);
    box-shadow: 0 8px 32px rgba(37,211,102,0.45);
  }
  .wpp-icon {
    width: 32px;
    height: 32px;
    background: rgba(255,255,255,0.2);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }

  /* ——— RODAPÉ ——— */
  .rodape {
    margin-top: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    opacity: 0;
    animation: fadeIn 0.6s ease 1.2s forwards;
  }

  .linha-decorativa {
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(75,159,225,0.3), transparent);
  }

  .rodape-texto {
    font-family: 'Caveat', cursive;
    font-size: 22px;
    color: rgba(168,212,245,0.4);
    letter-spacing: 2px;
  }

  /* ——— ANIMAÇÕES ——— */
  @keyframes fadeDown {
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    to { opacity: 1; }
  }
  @keyframes slideIn {
    to { opacity: 1; transform: translateX(0); }
  }

  /* Partículas flutuantes */
  .particula {
    position: absolute;
    border-radius: 50%;
    pointer-events: none;
    animation: flutuar linear infinite;
    opacity: 0;
  }
  @keyframes flutuar {
    0%   { opacity: 0; transform: translateY(0) scale(0.5); }
    10%  { opacity: 1; }
    90%  { opacity: 0.6; }
    100% { opacity: 0; transform: translateY(-120px) scale(1.2); }
  }

  /* ——— CHIPS ——— */
  .chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: 'Nunito', sans-serif;
    font-size: 13px;
    font-weight: 700;
    padding: 5px 12px;
    border-radius: 50px;
    letter-spacing: 0.3px;
  }
  .chip-voz   { background: rgba(167,139,250,0.15); color: #C4B5FD; border: 1px solid rgba(167,139,250,0.25); }
  .chip-texto { background: rgba(129,140,248,0.15); color: #A5B4FC; border: 1px solid rgba(129,140,248,0.25); }
  .chip-ia    { background: rgba(52,211,153,0.12);  color: #6EE7B7; border: 1px solid rgba(52,211,153,0.25); }
  .chip-n8n   { background: rgba(251,146,60,0.12);  color: #FDBA74; border: 1px solid rgba(251,146,60,0.25); }

  /* Pulso animado no ícone da IA */
  .pulse-ring {
    position: absolute;
    width: 56px;
    height: 56px;
    border-radius: 16px;
    border: 2px solid rgba(167,139,250,0.5);
    animation: pulso 2s ease-out infinite;
  }
  @keyframes pulso {
    0%   { transform: scale(1);   opacity: 0.7; }
    70%  { transform: scale(1.35); opacity: 0; }
    100% { transform: scale(1.35); opacity: 0; }
  }

  /* Responsividade para telas menores */
  @media (max-width: 700px) {
    .card { padding: 40px 28px 48px; }
    .titulo-principal { font-size: 52px; }
    .item-texto { font-size: 34px; }
    .wpp-link { font-size: 24px; }
  }
</style>
</head>
<body>

<div class="stage">

  <!-- Partículas decorativas -->
  <div class="particula" style="width:6px;height:6px;background:var(--amarelo);top:200px;left:80px;animation-duration:4s;animation-delay:0.5s"></div>
  <div class="particula" style="width:4px;height:4px;background:var(--azul);top:300px;right:100px;animation-duration:5.5s;animation-delay:1.2s"></div>
  <div class="particula" style="width:5px;height:5px;background:var(--amarelo);top:400px;left:140px;animation-duration:3.8s;animation-delay:2s"></div>
  <div class="particula" style="width:3px;height:3px;background:#A8D4F5;top:150px;right:180px;animation-duration:6s;animation-delay:0.8s"></div>

  <div class="card">

    <!-- BADGE + TÍTULO -->
    <div class="header">
      <div class="titulo-wrap">
        <div class="badge-aviso">⚡ atenção</div>
        <div class="titulo-principal">
          Avisos
          <span style="color:transparent;background:linear-gradient(135deg,#A8D4F5,var(--azul));-webkit-background-clip:text;background-clip:text;">Importantes</span>
          <span class="titulo-icon">
            <svg width="44" height="50" viewBox="0 0 44 50" fill="none">
              <polygon points="22,3 41,46 3,46" stroke="#F7C948" stroke-width="3.5" stroke-linejoin="round" fill="rgba(247,201,72,0.1)"/>
              <line x1="22" y1="18" x2="22" y2="32" stroke="#F7C948" stroke-width="3.5" stroke-linecap="round"/>
              <circle cx="22" cy="39" r="2.5" fill="#F7C948"/>
            </svg>
          </span>
        </div>
      </div>
    </div>

    <!-- ITENS -->
    <div class="itens">

      <!-- Item 1: Aulas novas -->
      <div class="item">
        <div class="item-lateral"></div>
        <div class="item-corpo">
          <div class="item-numero">01</div>
          <div class="item-texto">Aulas novas chegando!</div>
          <div class="item-icone icone-amarelo">
            <svg width="26" height="26" viewBox="0 0 26 26" fill="none">
              <rect x="3" y="3" width="20" height="20" rx="4" stroke="#F7C948" stroke-width="2"/>
              <line x1="9" y1="9" x2="17" y2="9" stroke="#F7C948" stroke-width="2" stroke-linecap="round"/>
              <line x1="9" y1="13" x2="17" y2="13" stroke="#F7C948" stroke-width="2" stroke-linecap="round"/>
              <line x1="9" y1="17" x2="14" y2="17" stroke="#F7C948" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </div>
        </div>
      </div>

      <!-- Item 2: Comunidade + link -->
      <div class="item">
        <div class="item-lateral" style="background:linear-gradient(180deg,#25D366 0%,#128C7E 100%)"></div>
        <div class="item-corpo" style="background:rgba(37,211,102,0.07);border-color:rgba(37,211,102,0.18);">
          <div class="item-numero" style="color:#80EAAA;">02</div>
          <div style="flex:1">
            <div class="item-texto" style="color:#B8F5D4;">Comunidade no App.</div>
            <a class="wpp-link" href="https://chat.whatsapp.com/KrIdP4Z11fUCp1rO7qnyOZ" target="_blank">
              <div class="wpp-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
              </div>
              Acesse o Grupo AQUI
            </a>
          </div>
          <div class="item-icone icone-verde">
            <svg width="26" height="26" viewBox="0 0 26 26" fill="none">
              <circle cx="13" cy="13" r="10" stroke="#48D296" stroke-width="2"/>
              <path d="M8 13l4 4 6-7" stroke="#48D296" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
        </div>
      </div>

      <!-- Item 3: Não pule aula -->
      <div class="item">
        <div class="item-lateral"></div>
        <div class="item-corpo">
          <div class="item-numero">03</div>
          <div class="item-texto">Não pule nenhuma aula.</div>
          <div class="item-icone icone-azul">
            <svg width="26" height="26" viewBox="0 0 26 26" fill="none">
              <circle cx="13" cy="13" r="10" stroke="#4B9FE1" stroke-width="2"/>
              <line x1="13" y1="7" x2="13" y2="14" stroke="#4B9FE1" stroke-width="2.5" stroke-linecap="round"/>
              <circle cx="13" cy="18" r="1.5" fill="#4B9FE1"/>
            </svg>
          </div>
        </div>
      </div>

      <!-- Item 4: Dúvidas -->
      <div class="item">
        <div class="item-lateral" style="background:linear-gradient(180deg,#F06490 0%,#C03060 100%)"></div>
        <div class="item-corpo" style="background:rgba(240,100,144,0.07);border-color:rgba(240,100,144,0.18);">
          <div class="item-numero" style="color:#F9B0C8;">04</div>
          <div class="item-texto" style="color:#FFD0E5;">Qualquer problema ou dúvida — chame o meu time!</div>
          <div class="item-icone icone-rosa">
            <svg width="26" height="26" viewBox="0 0 26 26" fill="none">
              <path d="M13 3C7.477 3 3 7.477 3 13c0 1.8.486 3.487 1.337 4.934L3 23l5.2-1.313A9.946 9.946 0 0013 23c5.523 0 10-4.477 10-10S18.523 3 13 3z" stroke="#F06490" stroke-width="2" stroke-linejoin="round"/>
              <line x1="9" y1="11" x2="17" y2="11" stroke="#F06490" stroke-width="2" stroke-linecap="round"/>
              <line x1="9" y1="15" x2="14" y2="15" stroke="#F06490" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </div>
        </div>
      </div>

      <!-- Item 5: IA 24h -->
      <div class="item">
        <div class="item-lateral" style="background:linear-gradient(180deg,#A78BFA 0%,#6D28D9 100%)"></div>
        <div class="item-corpo" style="background:rgba(139,92,246,0.09);border-color:rgba(139,92,246,0.22);padding:20px 24px 20px 26px;">
          <div class="item-numero" style="color:#C4B5FD;">05</div>
          <div style="flex:1">
            <div class="item-texto" style="color:#EDE9FE;font-size:38px;margin-bottom:10px;">
              IA de suporte 24h —&nbsp;<span style="color:#A78BFA;">voz&nbsp;&amp;&nbsp;texto</span>
            </div>
            <!-- Chips de tecnologia -->
            <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:4px;">
              <span class="chip chip-voz">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" style="flex-shrink:0"><rect x="9" y="2" width="6" height="13" rx="3" stroke="#A78BFA" stroke-width="2"/><path d="M5 10c0 3.866 3.134 7 7 7s7-3.134 7-7" stroke="#A78BFA" stroke-width="2" stroke-linecap="round"/><line x1="12" y1="19" x2="12" y2="22" stroke="#A78BFA" stroke-width="2" stroke-linecap="round"/></svg>
                Entende voz
              </span>
              <span class="chip chip-texto">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" style="flex-shrink:0"><path d="M4 6h16M4 10h16M4 14h10" stroke="#818CF8" stroke-width="2" stroke-linecap="round"/></svg>
                Entende texto
              </span>
              <span class="chip chip-ia">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" style="flex-shrink:0"><circle cx="12" cy="12" r="3" stroke="#34D399" stroke-width="2"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3M5.636 5.636l2.121 2.121M16.243 16.243l2.121 2.121M5.636 18.364l2.121-2.121M16.243 7.757l2.121-2.121" stroke="#34D399" stroke-width="1.8" stroke-linecap="round"/></svg>
                Sempre disponível
              </span>
              <span class="chip chip-n8n">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" style="flex-shrink:0"><path d="M12 3L3 8.5v7L12 21l9-5.5v-7L12 3z" stroke="#FB923C" stroke-width="2" stroke-linejoin="round"/></svg>
                Powered by n8n
              </span>
            </div>
          </div>
          <!-- Ícone animado -->
          <div class="item-icone" style="background:rgba(139,92,246,0.18);width:56px;height:56px;flex-direction:column;gap:2px;border-radius:16px;">
            <div class="pulse-ring"></div>
            <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
              <circle cx="14" cy="14" r="6" fill="rgba(167,139,250,0.3)" stroke="#A78BFA" stroke-width="2"/>
              <circle cx="14" cy="14" r="2.5" fill="#A78BFA"/>
              <path d="M14 4v4M14 20v4M4 14h4M20 14h4" stroke="#A78BFA" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
          </div>
        </div>
      </div>

    </div>

    <!-- RODAPÉ decorativo -->
    <div class="rodape">
      <div class="linha-decorativa"></div>
      <div class="rodape-texto">boas-vindas à comunidade</div>
      <div class="linha-decorativa"></div>
    </div>

  </div>
</div>

</body>
</html>
